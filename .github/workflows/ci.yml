name: CI
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: [ '8.1', '8.2', '8.3', '8.4', '8.5' ]
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Set up PHP ${{ matrix.php-version }}
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    coverage: ${{ matrix.php-version == '8.4' && 'pcov' || 'none' }}

            -   name: Get Composer Cache Directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache dependencies
                uses: actions/cache@v4
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
                    restore-keys: ${{ runner.os }}-composer-

            -   name: Install dependencies
                run: composer update --no-interaction --prefer-dist --prefer-stable

            -   name: Run tests
                run: ./vendor/bin/phpunit

            -   name: Static Analysis
                run: ./vendor/bin/phpstan analyse

    bc-check:
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'

            -   name: Install dependencies
                run: composer install --no-interaction --prefer-dist

            -   name: Install Roave BC Check
                run: composer require --no-interaction --dev roave/backward-compatibility-check ^8.13

            -   name: Fetch base branch
                run: git fetch origin ${{ github.base_ref }} --depth=1

            -   name: Run backward compatibility check
                run: ./vendor/bin/roave-backward-compatibility-check --from=origin/${{ github.base_ref || 'main' }} --format=github-actions
    coverage:
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push'
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Set up PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'
                    coverage: pcov

            -   name: Install dependencies
                run: composer install

            -   name: Run tests with coverage
                run: ./vendor/bin/phpunit --coverage-clover coverage.xml

            -   name: Upload coverage to Codecov
                uses: codecov/codecov-action@v5
                with:
                    files: ./coverage.xml
