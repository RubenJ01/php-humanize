when:
  - event: [pull_request, push, manual]
    branch: main

steps:
  - name: test
    image: php:8.4-cli
    environment:
      DEBIAN_FRONTEND: noninteractive
    commands:
      - apt-get update -qq && apt-get install -y -qq git unzip > /dev/null 2>&1
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - composer update --no-interaction --prefer-dist --quiet
      - echo "══════ PHP CodeSniffer (PSR-12) ══════"
      - vendor/bin/phpcs --standard=PSR12 src/
      - echo "══════ PHPStan (Level 9) ══════"
      - vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress
      - echo "══════ PHPUnit ══════"
      - pecl install pcov > /dev/null 2>&1 && docker-php-ext-enable pcov
      - vendor/bin/phpunit --colors=always --coverage-clover=coverage.xml

  - name: codecov
    image: woodpeckerci/plugin-codecov
    settings:
      files:
        - coverage.xml
      token:
        from_secret: codecov_token
